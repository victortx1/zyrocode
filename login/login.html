<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZYRO CODE — Login</title>
  <link rel="stylesheet" href="login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="login-bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <main class="login-container">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <h1 class="brand-name"><span data-i18n="app.name">ZYRO</span><span data-i18n="app.suffix">CODE</span></h1>
      <p class="brand-tagline" data-i18n="login.tagline">Aprenda programação do zero jogando</p>
    </div>

    <div class="feature-pills">
      <span class="pill">🎮 Gamificado</span>
      <span class="pill">🔥 Streak diária</span>
      <span class="pill">🏆 Ranking</span>
    </div>

    <div class="login-card">
      <h2 data-i18n="login.create">Crie sua conta grátis</h2>
      <p data-i18n="login.subtitle">Entre com Google e comece sua jornada de programação</p>

      <button class="btn-google" id="btnGoogle">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        <span data-i18n="login.google">Entrar com Google</span>
      </button>

      <div class="divider"><span data-i18n="login.or">ou</span></div>

      <button class="btn-guest" id="btnGuest"><span>👾</span> <span data-i18n="login.guest">Explorar como visitante</span></button>
      <button class="btn-logout hidden" id="btnLogout"><span>🚪</span> <span data-i18n="login.logout">Sair</span></button>
    </div>

    <div class="modules-preview">
      <div class="module-card" style="--c:#3b82f6">
        <span class="mod-icon">🌐</span>
        <span>HTML</span>
      </div>
      <div class="module-card" style="--c:#a855f7">
        <span class="mod-icon">🎨</span>
        <span>CSS</span>
      </div>
      <div class="module-card" style="--c:#f59e0b">
        <span class="mod-icon">⚙️</span>
        <span>JavaScript</span>
      </div>
      <div class="module-card" style="--c:#10b981">
        <span class="mod-icon">🧠</span>
        <span>Lógica</span>
      </div>
    </div>
  </main>

  <script type="module" src="../js/global-preferences.js"></script>
  <script type="module" src="./login.js"></script>
</body>
</html>
