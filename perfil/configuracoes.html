<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZYRO CODE - Configurações</title>

  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="configuracoes.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
</head>

<body>
  <main class="settings-page">
    <header class="settings-header">
      <div>
        <p class="settings-tag" data-i18n="settings.config">Configurações ZYRO CODE</p>
        <h1 data-i18n="settings.menu">Menu de configurações</h1>
      </div>
      <button id="btnDone" class="done-btn" data-i18n="settings.back">Perfil</button>
    </header>

    <section class="settings-list" aria-label="Lista de configurações">
      <a class="settings-item" href="preferencias.html">
        <span data-i18n="prefs.title">Preferências</span>
        <span class="settings-arrow">›</span>
      </a>
      <a class="settings-item" href="perfil-config.html">
        <span data-i18n="settings.profile">Perfil</span>
        <span class="settings-arrow">›</span>
      </a>
      <a class="settings-item" href="notificacoes.html">
        <span data-i18n="settings.notifications">Notificações</span>
        <span class="settings-arrow">›</span>
      </a>
      <a class="settings-item" href="cursos-config.html">
        <span data-i18n="settings.courses">Cursos</span>
        <span class="settings-arrow">›</span>
      </a>
      <a class="settings-item" href="redes-sociais.html">
        <span data-i18n="settings.social">Contas em redes sociais</span>
        <span class="settings-arrow">›</span>
      </a>
      <a class="settings-item" href="privacidade.html">
        <span data-i18n="settings.privacy">Privacidade</span>
        <span class="settings-arrow">›</span>
      </a>
      <a class="settings-item" href="ajuda.html">
        <span data-i18n="settings.help">Central de Ajuda</span>
        <span class="settings-arrow">›</span>
      </a>
      <a class="settings-item" href="comentarios.html">
        <span data-i18n="settings.comments">Fazer comentários</span>
        <span class="settings-arrow">›</span>
      </a>
      <button class="settings-item danger" id="logoutButton">
        <span data-i18n="settings.logout">Sair</span>
        <span class="settings-arrow">›</span>
      </button>
    </section>
  </main>

  <div id="settingsToast" class="settings-toast" role="status"></div>
  <script type="module" src="../js/global-preferences.js"></script>
  <script type="module" src="configuracoes.js"></script>
</body>
</html>
